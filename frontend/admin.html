<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>

    <style>
      body {
        margin: 0;
        background: radial-gradient(circle at top, #2a0a0a, #0b0b0b);
        color: #e5d3b3;
        font-family: "Segoe UI", sans-serif;
      }

      .layout {
        display: flex;
        height: 100vh;
      }

      /* LEFT PANEL */
      .sidebar {
        width: 320px;
        padding: 30px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(10, 10, 10, 0.95);
      }

      h1 {
        font-size: 20px;
        margin-bottom: 25px;
        letter-spacing: 2px;
      }

      h2 {
        font-size: 14px;
        margin-bottom: 15px;
        color: #aaa;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        background: transparent;
        border: 1px solid rgba(229, 211, 179, 0.3);
        color: white;
        border-radius: 6px;
        font-size: 13px;
      }

      input:focus {
        outline: none;
        border-color: gold;
      }

      /* FILE UPLOAD */
      .file-upload {
        display: block;
        padding: 10px;
        border: 1px solid rgba(229, 211, 179, 0.3);
        border-radius: 6px;
        font-size: 13px;
        color: #aaa;
        cursor: pointer;
        margin-bottom: 12px;
        text-align: center;
        transition: 0.3s;
      }

      .file-upload:hover {
        border-color: gold;
        color: #e5d3b3;
      }

      .file-upload input {
        display: none;
      }

      /* TOGGLE */
      .toggle {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 13px;
      }

      .switch {
        position: relative;
        width: 40px;
        height: 20px;
      }

      .switch input {
        opacity: 0;
      }

      .slider {
        position: absolute;
        background: #333;
        border-radius: 20px;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        transition: 0.3s;
      }

      .slider:before {
        content: "";
        position: absolute;
        height: 14px;
        width: 14px;
        left: 3px;
        top: 3px;
        background: #aaa;
        border-radius: 50%;
        transition: 0.3s;
      }

      .switch input:checked + .slider {
        background: gold;
      }

      .switch input:checked + .slider:before {
        transform: translateX(20px);
        background: black;
      }

      /* ✅ CLEAN DATETIME INPUT */
      input[type="datetime-local"] {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 12px;
        background: #0a0a0a;
        border: 1px solid rgba(229, 211, 179, 0.3);
        border-radius: 6px;
        color: #e5d3b3;
        font-size: 13px;
        appearance: none;
        -webkit-appearance: none;
      }

      input[type="datetime-local"]:focus {
        outline: none;
        border-color: gold;
        box-shadow: 0 0 6px rgba(255, 215, 0, 0.2);
      }

      input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.7;
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #e5d3b3, gold);
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
      }

      .logout {
        margin-top: 20px;
        background: #222;
        color: #e5d3b3;
      }

      #msg {
        margin-top: 10px;
        font-size: 12px;
      }

      /* RIGHT PANEL */
      .main {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 18px;
      }

      .card {
        background: rgba(15, 15, 15, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 12px;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 215, 0, 0.3);
      }

      .card img {
        width: 100%;
        height: 140px;
        object-fit: contain;
        background: #0a0a0a;
        border-radius: 6px;
      }

      .title {
        font-size: 13px;
        margin-top: 8px;
      }

      .price {
        font-size: 12px;
        margin: 4px 0 8px;
        color: #aaa;
      }

      .actions {
        display: flex;
        gap: 5px;
      }

      .actions button {
        flex: 1;
        font-size: 11px;
        padding: 6px;
      }

      .actions button:first-child {
        background: linear-gradient(135deg, #e5d3b3, gold);
      }

      .actions button:nth-child(2) {
        background: #222;
        color: #e5d3b3;
      }

      .actions button:last-child {
        background: #300;
        color: #ff4d4d;
      }

      /* MODAL */
      #editModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
      }

      .modal-box {
        background: #111;
        padding: 25px;
        border-radius: 10px;
        width: 300px;
      }
      #toggleModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      /* 🔥 REMOVE NUMBER INPUT ARROWS (PREMIUM LOOK) */

/* Chrome, Safari, Edge */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Firefox */
input[type=number] {
  -moz-appearance: textfield;
}
    </style>
  </head>

  <body>
    <div class="layout">
      <div class="sidebar">
        <h1>Admin Dashboard</h1>
        <h2>Add Product</h2>

        <input id="title" placeholder="Product Name" />

        <label class="file-upload">
          Upload Image
          <input id="image" type="file" />
        </label>

        <input id="price" type="number" placeholder="Fixed Price" />

        <div class="toggle">
          <span>Auction</span>
          <label class="switch">
            <input type="checkbox" id="isAuction" />
            <span class="slider"></span>
          </label>
        </div>

        <label style="font-size: 12px; color: #888">End Time</label>
        <input id="endTime" type="datetime-local" />

        <button onclick="addProduct()">Add Product</button>

        <p id="msg"></p>

        <button class="logout" onclick="logout()">Logout</button>
      </div>

      <div class="main">
        <h1>Products</h1>
        <div id="productList" class="grid"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="editModal">
      <div class="modal-box">
        <h3>Edit Product</h3>
        <input id="editTitle" placeholder="Title" />
        <input id="editPrice" placeholder="Price" />

        <button onclick="saveEdit()">Save</button>
        <button onclick="closeModal()" style="background: #222; color: #e5d3b3">
          Cancel
        </button>
      </div>
    </div>
    <!-- TOGGLE MODAL (SEPARATE) -->
    <div id="toggleModal">
      <div class="modal-box">
        <h3 id="toggleTitle">Set Value</h3>

        <input id="toggleInput" />

        <button onclick="confirmToggle()">Confirm</button>
        <button
          onclick="closeToggleModal()"
          style="background: #222; color: #e5d3b3"
        >
          Cancel
        </button>
      </div>
    </div>

    <script src="js/admin.js"></script>

    <script>
      let editId = null;

      function editProduct(id, title, price) {
        editId = id;
        document.getElementById("editTitle").value = title;
        document.getElementById("editPrice").value = price;
        document.getElementById("editModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("editModal").style.display = "none";
      }

      async function saveEdit() {
        const title = document.getElementById("editTitle").value;
        const price = document.getElementById("editPrice").value;

        await fetch(`${API}/products/${editId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: localStorage.getItem("token"),
          },
          body: JSON.stringify({ title, price }),
        });

        closeModal();
        loadProducts();
      }
    </script>
  </body>
</html>
