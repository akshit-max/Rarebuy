<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #2a0a0a, #0b0b0b);
      color: #e5d3b3;
      font-family: "Segoe UI", sans-serif;
      padding: 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .title {
      font-size: 22px;
      letter-spacing: 2px;
    }

    .logout-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(229,211,179,0.4);
      background: transparent;
      color: #e5d3b3;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn:hover {
      border-color: gold;
    }

    /* 🔥 CARD SECTION */
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 220px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(15,15,15,0.9);
      border: 1px solid rgba(229,211,179,0.15);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255,215,0,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .card p {
      font-size: 13px;
      color: #aaa;
    }

    .card button {
      margin-top: 12px;
      padding: 8px;
      width: 100%;
      border-radius: 6px;
      border: none;
      background: linear-gradient(135deg,#e5d3b3,gold);
      cursor: pointer;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="topbar">
  <div class="title">User Dashboard</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h2>Welcome 👋</h2>

<div class="cards">

  <div class="card" onclick="goHome()">
    <h3>Browse Products</h3>
    <p>Explore and bid on luxury items</p>
    <button>View Products</button>
  </div>

  <div class="card">
    <h3>My Bids</h3>
    <p>Track your auction activity</p>
    <button disabled>Coming Soon</button>
  </div>

  <div class="card">
    <h3>My Purchases</h3>
    <p>See what you've bought</p>
    <button disabled>Coming Soon</button>
  </div>

</div>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token || role !== "user") {
  window.location.href = "login.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "index.htm";
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
